# ─────────────────────────────────────────────────────────────────────────────
# Config: Qwen3 MoE  (custom-scaled from qwen3-30b-a3b base)
#
# Use this template when your training used model_name='qwen3-30b-a3b' with
# a custom architecture (scaled-up or scaled-down dims, different expert count
# etc.).  Set override_model_architecture: true and fill in the exact values
# used during training.
#
# Copy this file, rename it for your run, then set lustre_base and
# checkpoint_subdir.  Nothing else in this repo needs to change.
# ─────────────────────────────────────────────────────────────────────────────

# ── Model identity ────────────────────────────────────────────────────────────
model_type: moe                      # moe | dense
maxtext_model_name: qwen3-30b-a3b    # must match a key in utils/hf_model_configs.py

# ── Paths  (edit these for each run / VM) ────────────────────────────────────
lustre_base: /lustre-data/my-moe-run         # root of this model's data on Lustre
checkpoint_subdir: my-run-name/checkpoints   # relative path inside lustre_base
                                             # items are at: {lustre_base}/{checkpoint_subdir}/{step}/items

# Output subdirectory names (created automatically under lustre_base)
hf_out_subdir:     hf_converted             # → {lustre_base}/hf_converted/step_{N}/
params_out_subdir: param_only               # → {lustre_base}/param_only/step_{N}/

# ── Conversion settings ───────────────────────────────────────────────────────
weight_dtype: bfloat16
override_model_architecture: true    # true  = use the arch fields below instead of the
                                     #         defaults registered for qwen3-30b-a3b
                                     # false = standard qwen3-30b-a3b architecture

# ── Architecture overrides ────────────────────────────────────────────────────
# Required when override_model_architecture: true.
# These MUST exactly match the values used during training.
base_emb_dim: 2560
base_num_query_heads: 20
base_num_kv_heads: 5
base_num_decoder_layers: 28
head_dim: 128
base_mlp_dim: 6912            # dense MLP dim (not used for MoE layers, but must be set)
base_moe_mlp_dim: 1536        # MoE expert intermediate dim
num_experts: 12
num_experts_per_tok: 2
vocab_size: 131072
